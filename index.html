<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Shop & Skin Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <!-- Challenge 1: Профил с избор на Аватар -->
        <div class="player-profile">
            <img id="playerAvatar" src="https://dicebear.com" alt="Avatar" class="avatar-img">
            <div>
                <div class="player-name">ProGamer_2026</div>
                <button id="changeAvatarBtn" class="btn-small">Смени Аватар</button>
            </div>
        </div>

        <!-- Challenge 2: Търсачка -->
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Търси скин...">
        </div>

        <div class="wallet">
            <span>Твоите монети: </span><strong id="coinCount">1000</strong> 🪙
        </div>
    </header>

    <main>
        <!-- Секция за Loot Box -->
        <section class="lootbox-section">
            <h2>Късметлийски Loot Box</h2>
            <p>Цена за отваряне: <strong>200 монети</strong> 🪙</p>
            <button id="openBoxBtn" class="btn-lootbox">🎁 ОТВОРИ LOOT BOX</button>
            <div id="lootboxResult" class="lootbox-result"></div>
        </section>

        <!-- Секция Магазин -->
        <section class="shop-section">
            <h2>Магазин за скинове</h2>
            <div id="productsGrid" class="products-grid"></div>
        </section>

        <!-- Секция Инвентар -->
        <section class="inventory-section">
            <h2>Твоят инвентар (<span id="inventoryCount">0</span>)</h2>
            <div id="inventoryList" class="inventory-list">
                <p id="emptyMsg" class="empty-msg">Инвентарът ти е празен.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
